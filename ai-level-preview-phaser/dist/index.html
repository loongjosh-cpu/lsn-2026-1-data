<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>池塘谜题 - Phaser 迁移版</title>
    <style>
      :root {
        --panel: rgba(255, 252, 245, 0.78);
        --panel-strong: rgba(255, 250, 242, 0.94);
        --panel-border: rgba(139, 92, 52, 0.18);
        --text: #6e4d2f;
        --muted: #9a7b5d;
        --wood-dark: #7c4d2f;
        --shadow: 0 14px 36px rgba(112, 157, 93, 0.12);
        --font: "Trebuchet MS", "Segoe UI", "PingFang SC", sans-serif;
      }

      * { box-sizing: border-box; }

      html, body, #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background:
          radial-gradient(circle at top left, rgba(246, 146, 86, 0.14), transparent 22%),
          radial-gradient(circle at top right, rgba(136, 196, 96, 0.16), transparent 24%),
          linear-gradient(180deg, #f6f0df 0%, #d9f1f7 44%, #bfefff 100%);
        color: var(--text);
        font-family: var(--font);
        user-select: none;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 12% 10%, rgba(224, 120, 61, 0.35) 0 6px, transparent 7px),
          radial-gradient(circle at 16% 13%, rgba(206, 98, 51, 0.28) 0 10px, transparent 11px),
          radial-gradient(circle at 83% 15%, rgba(88, 160, 73, 0.22) 0 12px, transparent 13px),
          radial-gradient(circle at 10% 88%, rgba(66, 138, 72, 0.18) 0 26px, transparent 27px),
          radial-gradient(circle at 88% 84%, rgba(66, 138, 72, 0.18) 0 24px, transparent 25px);
        opacity: 0.85;
      }

      #app { position: relative; }
      #game-root { width: 100%; height: 100%; }

      .hud {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .floating, button, textarea {
        border-radius: 18px;
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
        font-family: var(--font);
      }

      .chip-button {
        appearance: none;
        background: var(--panel-strong);
        color: var(--text);
        padding: 10px 18px;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        transition: 0.18s ease;
      }

      .chip-button:hover { transform: translateY(-1px) scale(1.01); }

      .chip-button.primary {
        background: linear-gradient(135deg, #8bc34a, #6aa336);
        color: #fffdf5;
      }

      #header-container {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 10;
        pointer-events: none;
      }

      #header-container h1 {
        margin: 0;
        font-size: 34px;
        font-weight: 900;
        letter-spacing: 1px;
        color: var(--wood-dark);
        text-shadow: 0 4px 18px rgba(169, 108, 63, 0.16);
      }

      .system-info {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 1px;
      }

      #main-cp-display {
        position: absolute;
        top: 92px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 10px 16px;
        background: rgba(255, 250, 240, 0.84);
        color: var(--wood-dark);
        border: 1px solid var(--panel-border);
        border-radius: 999px;
        box-shadow: var(--shadow);
        pointer-events: none;
      }

      #main-cp-display strong { font-size: 14px; font-weight: 900; }
      #main-cp-display span { font-size: 12px; color: var(--muted); }

      .nav-btn {
        position: absolute;
        top: 24px;
        padding: 12px 18px;
        background: var(--panel-strong);
        color: var(--wood-dark);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        z-index: 30;
        pointer-events: auto;
        font-size: 13px;
        font-weight: 900;
      }

      #toggle-editor { left: 24px; }

      .menu-action {
        width: min(240px, calc(100vw - 36px));
        margin: 0 auto 14px;
      }

      #game-controls {
        position: absolute;
        right: 24px;
        bottom: 24px;
        display: none;
        gap: 10px;
        z-index: 40;
        pointer-events: auto;
      }

      #hint-wait-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.26);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 4200;
        pointer-events: auto;
      }

      .hint-wait-card {
        width: min(320px, calc(100vw - 36px));
        background: rgba(255, 250, 242, 0.95);
        border: 1px solid rgba(124, 77, 47, 0.26);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 12px 14px 16px;
      }

      .hint-wait-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .hint-wait-head strong {
        color: var(--wood-dark);
        font-size: 14px;
      }

      #hint-wait-close {
        width: 28px;
        height: 28px;
        min-width: 28px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        line-height: 1;
      }

      .hint-wait-body {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .hint-spinner {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid rgba(125, 84, 54, 0.22);
        border-top-color: rgba(125, 84, 54, 0.86);
        animation: hint-spin 0.9s linear infinite;
      }

      @keyframes hint-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .side-panel {
        position: absolute;
        top: 140px;
        width: 340px;
        max-height: calc(100vh - 190px);
        display: none;
        flex-direction: column;
        overflow: hidden;
        background: var(--panel);
        z-index: 20;
        pointer-events: auto;
      }

      .side-panel.left { left: 24px; }
      .side-panel.right { right: 24px; }

      .panel-header {
        padding: 12px 16px;
        font-size: 13px;
        font-weight: 900;
        color: var(--wood-dark);
        background: linear-gradient(135deg, rgba(183,132,72,0.16), rgba(131,181,93,0.12));
        border-bottom: 1px solid rgba(139, 92, 52, 0.12);
      }

      .panel-body {
        padding: 12px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .level-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 20px;
        width: 90%;
        max-width: 1200px;
        padding-bottom: 24px;
        align-self: center;
      }

      .level-card {
        background: rgba(255,255,255,0.82);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        padding: 22px;
        cursor: pointer;
        transition: 0.18s ease;
        text-align: left;
      }

      .level-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 40px rgba(139,92,52,0.12);
      }
      .level-card.active {
        border-color: rgba(124,77,47,0.42);
        box-shadow: inset 0 0 0 1px rgba(124,77,47,0.18);
      }

      .level-card strong {
        display: block;
        color: var(--wood-dark);
        font-size: 14px;
      }

      .level-card span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
      }

      .editor-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .editor-chip {
        padding: 10px 12px;
        background: rgba(255,255,255,0.56);
        border-radius: 14px;
        text-align: center;
      }

      .editor-chip strong {
        display: block;
        color: var(--wood-dark);
        font-size: 14px;
      }

      .editor-chip span {
        display: block;
        color: var(--muted);
        font-size: 11px;
      }

      textarea {
        width: 100%;
        min-height: 280px;
        resize: vertical;
        border-radius: 18px;
        padding: 14px;
        background: rgba(255,255,255,0.78);
        color: var(--text);
        font-size: 12px;
        line-height: 1.45;
      }

      .editor-actions {
        display: flex;
        gap: 10px;
      }

      .editor-status {
        min-height: 18px;
        color: var(--muted);
        font-size: 12px;
      }

      #levels-panel {
        inset: 0;
        width: auto;
        max-height: none;
        border-radius: 0;
        background: rgba(255, 248, 252, 0.42);
        padding-top: 170px;
        overflow-y: auto;
        align-items: center;
      }

      #levels-panel .panel-header {
        background: none;
        border: none;
        padding: 0 24px 18px;
        font-size: 30px;
        letter-spacing: 2px;
        box-shadow: none;
      }

      #levels-panel .panel-body {
        width: 100%;
        align-items: center;
        padding: 0 0 24px;
      }

      .menu-subtitle {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.6px;
        margin: 0 auto 22px;
        text-align: center;
      }

      #editor-panel {
        right: 24px;
        top: 140px;
        width: 350px;
      }

      .screen-overlay {
        position: absolute;
        inset: 0;
        background: rgba(255, 248, 252, 0.96);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 5000;
        text-align: center;
        padding: 24px;
        pointer-events: auto;
      }

      .screen-overlay h2 {
        margin: 0;
        font-size: 56px;
        font-weight: 900;
        color: var(--wood-dark);
      }

      .screen-overlay p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 980px) {
        .side-panel {
          width: min(360px, calc(100vw - 20px));
          left: 10px !important;
          right: 10px !important;
        }
      }

      @media (max-width: 820px) {
        #header-container {
          top: max(12px, env(safe-area-inset-top));
          width: calc(100vw - 28px);
        }

        #header-container h1 { font-size: 28px; }

        .system-info {
          margin-top: 4px;
          font-size: 11px;
          letter-spacing: 0.4px;
        }

        #main-cp-display {
          top: 76px;
          width: calc(100vw - 28px);
          max-width: 480px;
          justify-content: center;
          gap: 10px;
          padding: 8px 12px;
        }

        .level-grid {
          width: 100%;
          max-width: 560px;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 12px;
          padding-bottom: 24px;
        }

        .level-card {
          padding: 14px;
          border-radius: 16px;
        }

        .nav-btn {
          top: auto;
          bottom: calc(12px + env(safe-area-inset-bottom));
          padding: 10px 14px;
          font-size: 12px;
          border-radius: 14px;
        }

        #toggle-editor { left: 12px; }

        #levels-panel {
          padding-top: 124px;
          padding-left: 12px;
          padding-right: 12px;
          padding-bottom: calc(18px + env(safe-area-inset-bottom));
          justify-content: flex-start;
        }

        #levels-panel .panel-header {
          font-size: 24px;
          padding-bottom: 14px;
        }

        .screen-overlay h2 {
          font-size: 38px;
        }

        #game-controls {
          left: 12px;
          right: 12px;
          bottom: calc(12px + env(safe-area-inset-bottom));
          justify-content: center;
          flex-wrap: wrap;
        }

      }
    </style>
    <script type="module" crossorigin src="/assets/index-DWbU4Cy0.js"></script>
  </head>
  <body>
      <div id="app">
        <div id="game-root"></div>
        <div class="hud">
        <div id="header-container">
          <h1>池塘谜题</h1>
          <div class="system-info">PHASER + TYPESCRIPT 迁移版</div>
        </div>

        <div id="main-cp-display">
          <strong id="level-title">关卡1</strong>
          <span id="level-meta">14 × 11</span>
        </div>

        <button id="toggle-editor" class="nav-btn">关卡编辑</button>

        <aside id="levels-panel" class="floating side-panel left">
          <div class="panel-header">关卡列表</div>
          <div class="panel-body">
            <button id="unlock-all-btn" class="chip-button menu-action">解锁所有关卡</button>
            <div class="menu-subtitle">选择关卡开始游玩，或进入编辑模式调整当前关卡</div>
            <div id="levels-grid" class="level-grid"></div>
          </div>
        </aside>

        <aside id="editor-panel" class="floating side-panel right">
          <div class="panel-header">关卡编辑</div>
          <div class="panel-body">
            <div class="editor-meta">
              <div class="editor-chip"><strong id="editor-rows">0</strong><span>行数</span></div>
              <div class="editor-chip"><strong id="editor-cols">0</strong><span>列数</span></div>
              <div class="editor-chip"><strong id="editor-fishes">0</strong><span>鱼数</span></div>
            </div>
            <textarea id="editor-json" spellcheck="false"></textarea>
            <div class="editor-actions">
              <button id="apply-editor" class="chip-button primary">应用到当前关卡</button>
              <button id="reset-editor" class="chip-button">重载当前关卡</button>
            </div>
            <div class="editor-actions">
              <button id="editor-back" class="chip-button">返回关卡列表</button>
            </div>
            <div id="editor-status" class="editor-status"></div>
          </div>
        </aside>

        <div id="game-controls">
          <button id="reset-level" class="chip-button">重置</button>
          <button id="hint-level" class="chip-button">提示</button>
          <button id="back-to-menu" class="chip-button primary">返回列表</button>
        </div>

        <div id="hint-wait-overlay">
          <div class="hint-wait-card">
            <div class="hint-wait-head">
              <strong>提示计算中</strong>
              <button id="hint-wait-close" class="chip-button" aria-label="取消提示计算">×</button>
            </div>
            <div class="hint-wait-body">
              <span class="hint-spinner" aria-hidden="true"></span>
              <span>正在搜索可执行提示，可点击右上角取消。</span>
            </div>
          </div>
        </div>

        <div id="win-screen" class="screen-overlay">
          <h2>过关啦</h2>
          <p>这一关已经记录为完成，可以继续挑战下一关。</p>
          <div style="display:flex; gap:10px; margin-top:28px; flex-wrap:wrap; justify-content:center;">
            <button id="win-next" class="chip-button primary">下一关</button>
            <button id="win-menu" class="chip-button">返回关卡列表</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
